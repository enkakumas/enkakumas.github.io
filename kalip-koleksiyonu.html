    /* ─── RESET & BASE ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── SCROLLBAR ─────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }

    /* ─── BACKGROUND ORBS ───────────────────────────────────── */
    .bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.9;
      transition: background var(--transition);

    .orb-1 {

    /* ─── SEARCH BAR ────────────────────────────────────────── */
    .search-wrap {

    }

    /* ─── PATTERNS GRID ─────────────────────────────────────── */
    /* 
      =========================================================
      DYNAMIC CONTAINER — Supabase verileri buraya yüklenecek
      JavaScript ile renderPatterns(data) fonksiyonunu çağır
      =========================================================
    */
    #patternsContainer {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      animation: fadeInUp 0.5s ease-out both;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    /* ─── PATTERN CARD ──────────────────────────────────────── */
    .pattern-card {
      position: relative;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 28px 24px 24px;
      backdrop-filter: blur(18px) saturate(1.3);
      -webkit-backdrop-filter: blur(18px) saturate(1.3);
      box-shadow:
        0 2px 12px var(--glass-shadow),
        0 8px 32px rgba(0,0,0,0.05),
        inset 0 1px 0 rgba(255,255,255,0.5);
      transition:
        transform 0.35s cubic-bezier(.2,.8,.4,1),
        box-shadow 0.35s cubic-bezier(.2,.8,.4,1),
        border-color 0.35s;
      cursor: default;
      animation: cardIn 0.5s ease-out both;
      overflow: hidden;
    }
    [data-theme="dark"] .pattern-card {
      box-shadow:
        0 2px 12px rgba(0,0,0,0.35),
        0 8px 40px rgba(0,0,0,0.30),
        inset 0 1px 0 rgba(255,255,255,0.04);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    /* stagger children */
    #patternsContainer .pattern-card:nth-child(1) { animation-delay: 0.05s; }
    #patternsContainer .pattern-card:nth-child(2) { animation-delay: 0.10s; }
    #patternsContainer .pattern-card:nth-child(3) { animation-delay: 0.15s; }
    #patternsContainer .pattern-card:nth-child(4) { animation-delay: 0.20s; }
    #patternsContainer .pattern-card:nth-child(5) { animation-delay: 0.25s; }
    #patternsContainer .pattern-card:nth-child(6) { animation-delay: 0.30s; }
    #patternsContainer .pattern-card:nth-child(7) { animation-delay: 0.35s; }
    #patternsContainer .pattern-card:nth-child(8) { animation-delay: 0.40s; }
    .pattern-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .pattern-card:hover {
      transform: translateY(-8px) scale(1.015);
      box-shadow:
        0 16px 48px rgba(130,80,50,0.18),
        0 4px 16px rgba(130,80,50,0.10),
        inset 0 1px 0 rgba(255,255,255,0.6);
      border-color: rgba(176,123,94,0.35);
    }
    [data-theme="dark"] .pattern-card:hover {
      box-shadow:
        0 20px 60px rgba(0,0,0,0.50),
        0 4px 16px rgba(200,130,80,0.20),
        inset 0 1px 0 rgba(255,255,255,0.05);
    }
    /* Shine sweep on hover */
    .pattern-card::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(
        105deg,
        transparent 30%,
        rgba(255,255,255,0.12) 50%,
        transparent 70%
      );
      transform: skewX(-15deg);
      transition: left 0.55s ease;
      pointer-events: none;
    }
    .pattern-card:hover::after { left: 150%; }
    /* Card top strip */
    .card-icon-area {

    .empty-state {

    .skeleton-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 28px 24px 24px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    .skeleton-line {
      border-radius: 99px;
      background: linear-gradient(
        90deg,
        var(--accent-light) 25%,
        rgba(176,123,94,0.18) 50%,
        var(--accent-light) 75%
      );
      background-size: 200% 100%;
      animation: shimmer 1.6s infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skeleton-circle {
      width: 68px; height: 68px;
      border-radius: 50%;
      margin: 0 auto 20px;
    }
    .skeleton-line.h12 { height: 12px; margin-bottom: 10px; width: 40%; margin-left: auto; margin-right: auto; }
    .skeleton-line.h16 { height: 16px; margin-bottom: 8px; width: 80%; margin-left: auto; margin-right: auto; }
    .skeleton-line.h14 { height: 14px; margin-bottom: 6px; width: 60%; margin-left: auto; margin-right: auto; }
    .skeleton-line.btn  { height: 46px; width: 100%; margin-top: 22px; }
    /* ─── FOOTER ────────────────────────────────────────────── */
    .footer {
      margin-top: 80px;
      padding: 32px 0 0;
      border-top: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      transition: border-color var(--transition);
    }
    .footer-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-secondary);
      transition: color var(--transition);
    }
    .footer-copy {
      font-size: 0.75rem;
      color: var(--text-muted);
      transition: color var(--transition);
    }
    /* ─── RESPONSIVE ────────────────────────────────────────── */
    @media (max-width: 768px) {
      .page-wrapper { padding: 0 16px 60px; }
      .navbar { padding: 12px 16px; margin: 0 -16px; }
      .brand-name { font-size: 1.05rem; }
      #patternsContainer { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
      .hero { padding: 36px 0 20px; }
    }
    @media (max-width: 480px) {
      #patternsContainer { grid-template-columns: 1fr; }
      .theme-toggle-label { display: none; }
    }
    /* ─── THEME TRANSITION OVERLAY ──────────────────────────── */
    .theme-flash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      background: transparent;
      transition: background 0.2s;
    }
    .theme-flash.active { background: rgba(0,0,0,0.06); }
  </style>
</head>
<body>
<!-- Theme flash overlay -->
<div class="theme-flash" id="themeFlash"></div>
<!-- Animated background orbs -->
<div class="bg-canvas" aria-hidden="true">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="page-wrapper">
  <!-- ── NAVBAR ─────────────────────────────────────────── -->
  <nav class="navbar" role="navigation" aria-label="Ana navigasyon">

      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>

    <div class="brand">

  <!-- ── HERO ───────────────────────────────────────────── -->

      Profesyonel Dikiş Kalıpları
    </div>

      Koleksiyonumuzu<br/><span>Keşfedin</span>

  </header>
  <!-- ── SEARCH BAR ─────────────────────────────────────── -->
  <div class="search-wrap" role="search">
    <div class="search-icon" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>

    <input
      type="search"
      id="searchInput"
      placeholder="Kalıp ara… (elbise, pantolon, ceket…)"
      autocomplete="off"
      aria-label="Kalıp ara"
    />
    <button class="search-clear" id="searchClear" aria-label="Aramayı temizle" title="Temizle">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <!-- ── RESULTS BAR ────────────────────────────────────── -->
  <div class="results-bar" id="resultsBar">
    <span class="results-count" id="resultsCount">
      <strong id="countNum">0</strong> kalıp listeleniyor
    </span>
  </div>
  <!-- ══════════════════════════════════════════════════════
       DYNAMIC PATTERNS CONTAINER
       ─────────────────────────────────────────────────────
       Supabase entegrasyonu için:
       
         const { data, error } = await supabase
           .from('patterns')
           .select('*')
           .order('created_at', { ascending: false });
         
         if (!error) renderPatterns(data);
       
       Her kayıt şu alanları içermeli:
         { id, title, file_url, category, size_range, created_at }
       ══════════════════════════════════════════════════════ -->
  <main id="patternsContainer" aria-label="Kalıp listesi">
    <!-- Kartlar buraya JS ile enjekte edilecek -->
  </main>
  <!-- ── FOOTER ─────────────────────────────────────────── -->
  <footer class="footer">
    <span class="footer-brand">EN-KA KUMAŞ</span>
    <span class="footer-copy">© 2026 EN-KA KUMAŞ · Tüm hakları saklıdır.</span>
  </footer>
</div><!-- /page-wrapper -->
<script>
// ═══════════════════════════════════════════════════════════
// EN-KA KUMAŞ · Kalıp Koleksiyonu
// ═══════════════════════════════════════════════════════════
// ── 2. SVG İKONLARI ────────────────────────────────────────
const ICONS = {
  pdf: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
    <polyline points="14 2 14 8 20 8"/>
    <line x1="16" y1="13" x2="8" y2="13"/>
    <line x1="16" y1="17" x2="8" y2="17"/>
    <polyline points="10 9 9 9 8 9"/>
  </svg>`,
  scissors: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/>
    <line x1="20" y1="4" x2="8.12" y2="15.88"/>
    <line x1="14.47" y1="14.48" x2="20" y2="20"/>
    <line x1="8.12" y1="8.12" x2="12" y2="12"/>
  </svg>`,
  needle: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 17L17 3l4 4L7 21 3 17z"/><path d="M3 17l4 4"/>
    <circle cx="17" cy="4" r="1.5"/>
  </svg>`,
  shirt: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M20.38 3.46L16 2a4 4 0 01-8 0L3.62 3.46a2 2 0 00-1.34 2.23l.58 3.57a1 1 0 00.99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 002-2V10h2.15a1 1 0 00.99-.84l.58-3.57a2 2 0 00-1.34-2.23z"/>
  </svg>`,
  ruler: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1 10h22l-6 13H7L1 10z"/>
    <line x1="7" y1="10" x2="7" y2="14"/>
    <line x1="11" y1="10" x2="11" y2="12"/>
    <line x1="15" y1="10" x2="15" y2="14"/>
    <line x1="19" y1="10" x2="19" y2="12"/>
  </svg>`,
  download: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
    <polyline points="7 10 12 15 17 10"/>
    <line x1="12" y1="15" x2="12" y2="3"/>
  </svg>`
};
// Kategori bazlı ikon seçici
function getIconForCategory(category) {
  const c = (category || '').toLowerCase();
  if (c.includes('etek') || c.includes('pantolon')) return ICONS.scissors;
  if (c.includes('gömlek') || c.includes('bluz') || c.includes('tunik')) return ICONS.shirt;
  if (c.includes('ceket')) return ICONS.ruler;
  if (c.includes('elbise')) return ICONS.needle;
  return ICONS.pdf;
}
// ── 3. KART OLUŞTURMA ──────────────────────────────────────
function createPatternCard(pattern) {
  const card = document.createElement('article');
  card.className = 'pattern-card';
  card.dataset.title = (pattern.title || '').toLowerCase();
  card.dataset.category = (pattern.category || '').toLowerCase();
  card.innerHTML = `
    <div class="card-icon-area" aria-hidden="true">
      ${getIconForCategory(pattern.category)}
    </div>
    <div class="card-badge">
      <span class="card-badge-dot"></span>
      PDF Kalıp
    </div>
    <h2 class="card-title">${escapeHtml(pattern.title || 'İsimsiz Kalıp')}</h2>
    <div class="card-meta">
      <span class="card-meta-item">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/>
        </svg>
        ${escapeHtml(pattern.category || 'Genel')}
      </span>
      <span class="card-meta-item">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        Beden ${escapeHtml(pattern.size_range || '–')}
      </span>
    </div>
    <div class="card-divider" aria-hidden="true"></div>
    <a
      href="${escapeHtml(pattern.file_url || '#')}"
      class="card-download-btn"
      ${pattern.file_url && pattern.file_url !== '#' ? 'download' : ''}
      aria-label="${escapeHtml(pattern.title)} kalıbını indir"
    >
      ${ICONS.download}
      Kalıbı İndir
    </a>
  `;
  return card;
}
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
// ── 4. RENDER FONKSİYONU (Supabase uyumlu) ─────────────────
/**
 * Kalıp kartlarını container'a render eder.
 * Supabase entegrasyonu için bu fonksiyonu çağırın:
 *
 *   const { data } = await supabase.from('patterns').select('*');
 *   renderPatterns(data);
 *
 * @param {Array} patterns - Kalıp nesneleri dizisi
 */
function renderPatterns(patterns) {
  const container = document.getElementById('patternsContainer');
  container.innerHTML = '';
  if (!patterns || patterns.length === 0) {
    container.innerHTML = `
      <div class="empty-state" role="status">
        <div class="empty-icon">${ICONS.scissors}</div>
        <p class="empty-title">Kalıp Bulunamadı</p>
        <p class="empty-text">Arama kriterlerinize uygun kalıp bulunmuyor.<br>Farklı bir terim deneyin.</p>
      </div>`;
    updateCount(0);
    return;
  }
  const fragment = document.createDocumentFragment();
  patterns.forEach(p => fragment.appendChild(createPatternCard(p)));
  container.appendChild(fragment);
  updateCount(patterns.length);
}
// ── 5. ARAMA MANTIĞI ───────────────────────────────────────
// Supabase'den yüklenen kalıpların tutulduğu dizi.
// loadFromSupabase() çalıştıktan sonra bu dizi dolar.
let allPatterns = [];
function filterPatterns(query) {
  if (!query || query.trim() === '') return allPatterns;
  const q = query.toLowerCase().trim();
  return allPatterns.filter(function(p) {
    return (
      (p.title    || '').toLowerCase().includes(q) ||
      (p.category || '').toLowerCase().includes(q)
    );
  });
}
function updateCount(n) {
  document.getElementById('countNum').textContent = n;
}
// DOM referansları — sayfa yüklendikten sonra erişilecek
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
// Arama gecikmesi (ms) — çok hızlı istekleri engeller
let searchTimeout = null;
searchInput.addEventListener('input', function() {
  const val = searchInput.value;
  searchClear.classList.toggle('visible', val.length > 0);
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(function() {
    renderPatterns(filterPatterns(val));
  }, 220);
});
searchClear.addEventListener('click', function() {
  searchInput.value = '';
  searchClear.classList.remove('visible');
  renderPatterns(allPatterns);
  searchInput.focus();
});
// ── 6. TEMA YÖNETİMİ ───────────────────────────────────────
const DARK_START_HOUR = 17; // 17:00'den sonra dark mode
function isDarkHour() {
  return new Date().getHours() >= DARK_START_HOUR;
}
function applyTheme(dark, animate) {
  const htmlEl  = document.documentElement;
  const iconEl  = document.getElementById('themeIcon');
  const labelEl = document.getElementById('themeLabel');
  const flashEl = document.getElementById('themeFlash');
  if (animate) {
    flashEl.classList.add('active');
    setTimeout(function() { flashEl.classList.remove('active'); }, 250);
  }
  if (dark) {
    htmlEl.setAttribute('data-theme', 'dark');
    iconEl.textContent  = '🌙';
    labelEl.textContent = 'Karanlık';
  } else {
    htmlEl.setAttribute('data-theme', 'light');
    iconEl.textContent  = '☀️';
    labelEl.textContent = 'Aydınlık';
  }
  // Kullanıcının manuel tercihini ve zamanını kaydet
  localStorage.setItem('enka-theme-override',    dark ? 'dark' : 'light');
  localStorage.setItem('enka-theme-override-ts', Date.now().toString());
}
function initTheme() {
  var savedTheme        = localStorage.getItem('enka-theme-override');
  var savedThemeTs      = parseInt(localStorage.getItem('enka-theme-override-ts') || '0', 10);
  var nowMs             = Date.now();
  // 8 saat içinde manuel seçim yapıldıysa ona uy, yoksa saate göre otomatik karar ver
  var OVERRIDE_TTL_MS   = 8 * 60 * 60 * 1000;
  var isOverrideActive  = savedTheme && (nowMs - savedThemeTs) < OVERRIDE_TTL_MS;
  if (isOverrideActive) {
    applyTheme(savedTheme === 'dark', false);
  } else {
    applyTheme(isDarkHour(), false);
  }
}
document.getElementById('themeToggle').addEventListener('click', function() {
  var currentlyDark = document.documentElement.getAttribute('data-theme') === 'dark';
  applyTheme(!currentlyDark, true);
});
// Saat başı tema kontrolü
function scheduleHourlyCheck() {
  var nowDate           = new Date();
  var msUntilNextHour   = (60 - nowDate.getMinutes()) * 60 * 1000
                          - nowDate.getSeconds() * 1000;
  setTimeout(function() {
    var savedThemeTs    = parseInt(localStorage.getItem('enka-theme-override-ts') || '0', 10);
    var OVERRIDE_TTL_MS = 8 * 60 * 60 * 1000;
    var isOverrideActive = (Date.now() - savedThemeTs) < OVERRIDE_TTL_MS;
    if (!isOverrideActive) {
      applyTheme(isDarkHour(), true);
    }
    scheduleHourlyCheck(); // her saat başı tekrar zamanla
  }, msUntilNextHour);
}
// ── 7. YÜKLEME İSKELETİ ────────────────────────────────────
function showSkeletons(count) {
  var container    = document.getElementById('patternsContainer');
  var skeletonHTML = Array.from({ length: count }, function() {
    return '<div class="skeleton-card" aria-hidden="true">'
      + '<div class="skeleton-line skeleton-circle"></div>'
      + '<div class="skeleton-line h12"></div>'
      + '<div class="skeleton-line h16"></div>'
      + '<div class="skeleton-line h14"></div>'
      + '<div class="skeleton-line btn"></div>'
      + '</div>';
  }).join('');
  container.innerHTML = skeletonHTML;
}
// ── 8. SUPABASE BAĞLANTISI ──────────────────────────────────
var SUPABASE_URL      = 'https://cmpmfxzekywfupsiibln.supabase.co';     
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtcG1meHpla3l3ZnVwc2lpYmxuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NDgzOTQsImV4cCI6MjA5ODEyNDM5NH0.wY8EC_chAFOb9RiGLg569mTaXyjsU-NnDu7lqsK0rrU';                
// Supabase'den kalıpları çek ve kartlara yansıt
async function loadFromSupabase() {
  showSkeletons(8); // Çekerken iskelet göster
  // Supabase JS v2 ESM modülü (CDN)
  var supabaseModule = await import(
    'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
  );
  var supabaseClient = supabaseModule.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  var result = await supabaseClient
    .from('patterns')
    .select('id, title, category, size_range, file_url, created_at')
    .order('created_at', { ascending: false });
  var patterns   = result.data;   // Gelen kayıtlar
  var fetchError = result.error;  // Hata varsa dolu olur
  if (fetchError) {
    console.error('[EN-KA] Supabase hatası:', fetchError.message);
    renderPatterns([]); // Hata durumunda boş durum göster
    return;
  }
  allPatterns = patterns || []; // Global diziye ata (arama için kullanılır)
  renderPatterns(allPatterns);
}
// ── 9. BAŞLATMA ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  initTheme();          // Temayı belirle (saat / localStorage)
  scheduleHourlyCheck(); // Saat başı otomatik tema kontrolü
  loadFromSupabase();   // Supabase'den veriyi çek → kartları bas
});
</script>
</body>
